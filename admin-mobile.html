<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Admin Console</title>
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="admin-mobile.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ── HEADER ──────────────────────────────────────────── -->
    <header class="adm-header">
        <div class="adm-header-left">
            <button class="adm-back-btn" onclick="window.location.href='panel-mobile.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div>
                <span class="adm-badge">Root</span>
                <h1 class="adm-title">Admin Console</h1>
            </div>
        </div>
        <button class="adm-add-btn" id="openAddUser">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add User
        </button>
    </header>

    <!-- ── SEGMENT TABS ─────────────────────────────────────── -->
    <div class="adm-segment">
        <button class="seg-btn active" data-tab="adm-users">Users</button>
        <button class="seg-btn" data-tab="adm-activity">Activity</button>
    </div>

    <!-- ── TAB: USERS ──────────────────────────────────────── -->
    <div class="adm-tab active" id="adm-users">
        <div class="user-list" id="userList">
            <!-- User cards injected by JS -->
        </div>
        <div class="adm-empty" id="userEmpty" style="display:none">
            <span>👤</span>
            <p>No users yet</p>
        </div>
    </div>

    <!-- ── TAB: ACTIVITY ───────────────────────────────────── -->
    <div class="adm-tab" id="adm-activity">
        <div class="activity-list" id="activityList">
            <!-- Activity items injected by JS -->
        </div>
    </div>

    <!-- ── SHEET BACKDROP ──────────────────────────────────── -->
    <div class="sheet-backdrop" id="userSheetBackdrop"></div>

    <!-- ── BOTTOM SHEET: ADD / EDIT USER ──────────────────── -->
    <div class="sheet" id="userSheet">
        <div class="sheet-pill"></div>
        <div class="sheet-top">
            <h3 id="sheetTitle">New User</h3>
            <button class="sheet-close-btn" id="closeUserSheet">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="sheet-body">
            <div class="field-group">
                <label>Username</label>
                <input type="text" id="su-username" placeholder="e.g. john_doe" autocapitalize="none">
            </div>
            <div class="field-group" id="su-passwordGroup">
                <label>Password</label>
                <input type="password" id="su-password" placeholder="Min 6 characters">
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label>Role</label>
                    <select id="su-role">
                        <option value="Staff">Staff</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Department</label>
                    <select id="su-dept">
                        <option value="Housekeeping">Housekeeping</option>
                        <option value="Front Desk">Front Desk</option>
                        <option value="Concierge">Concierge</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Food &amp; Beverage">Food &amp; Beverage</option>
                        <option value="Reservations">Reservations</option>
                        <option value="Security">Security</option>
                        <option value="Spa">Spa</option>
                    </select>
                </div>
            </div>
            <button class="primary-btn" id="su-submit">Save User</button>
        </div>
    </div>

    <!-- ── CONFIRM SHEET: DELETE ───────────────────────────── -->
    <div class="sheet-backdrop" id="delBackdrop"></div>
    <div class="sheet confirm-sheet" id="delSheet">
        <div class="sheet-pill"></div>
        <div class="sheet-body confirm-body">
            <p class="confirm-title">Remove this user?</p>
            <p class="confirm-desc">They will lose all system access.</p>
            <button class="danger-btn" id="delConfirmYes">Yes, Remove</button>
            <button class="secondary-btn" id="delConfirmNo">Cancel</button>
        </div>
    </div>

    <!-- ── TOAST ────────────────────────────────────────────── -->
    <div class="app-toast" id="adm-toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin-mobile.js"></script>
</body>
</html>
